  - part:  'filename'
    match: 'omniauth.rb'
    name: 'OmniAuth configuration file'
  - part:  'filename'
    match: 'settings.py'
    name: 'Django configuration file'
  - part: 'contents'
    regex: "((\\\"|'|`)?((?i)api)[_-]?((?i)key|(?i)token|(?i)secret)(\\\"|'|`)?\\\\s{0,50}(:|=>|=)\\\\s{0,50}(\\\"|'|`)?[A-Za-z0-9_\\-]{8,}(\\\"|'|`)?)|(?i)(apikey|api_key|secret|token)['\"\\s:=]+[a-zA-Z0-9\\-_.]{8,100}"
    name: 'API Key'
  - part: 'contents'
    regex: "((\\\"|'|`)?((?i)openai)[_-]?((?i)api)[_-]?((?i)key|(?i)token|(?i)secret)(\\\"|'|`)?\\\\s{0,50}(:|=>|=)\\\\s{0,50}(\\\"|'|`)?(sk-[a-zA-Z0-9]{20,}|sk-proj-[a-zA-Z0-9]{20,})(\\\"|'|`)?)"
    name: 'OpenAI API Key'
  - part: 'contents'
    regex: "(sk-[a-zA-Z0-9]{20,}|sk-proj-[a-zA-Z0-9]{20,})"
    name: 'OpenAI API Key'
  - part: 'contents'
    regex: "((\\\"|'|`)?((?i)gemini)[_-]?((?i)api)[_-]?((?i)key|(?i)token|(?i)secret)(\\\"|'|`)?\\\\s{0,50}(:|=>|=)\\\\s{0,50}(\\\"|'|`)?[A-Za-z0-9_\\-]{20,}(\\\"|'|`)?)"
