    name: 'Together AI API Key'
  - part: 'contents'
    regex: "((\\\"|'|`)?((?i)fireworks)[_-]?((?i)api)[_-]?((?i)key|(?i)token|(?i)secret)(\\\"|'|`)?\\\\s{0,50}(:|=>|=)\\\\s{0,50}(\\\"|'|`)?[A-Za-z0-9_\\-]{32,}(\\\"|'|`)?)"
    name: 'Fireworks AI API Key'
  - part:  'extension'
