<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="color-scheme" content="light dark" />
        <meta name="theme-color" content="#1e293b" />

        <title>shhgit: find secrets in real time across GitHub, GitLab and BitBucket</title>
        <meta name="description" content="shhgit finds secrets and sensitive files across GitHub, GitLab and BitBucket code and Gists committed in near real time." />
        <meta name="author" content="Mustafa Kaan Demirhan (@mstfknn)" />
        <meta name="robots" content="index, follow" />
        <link rel="canonical" href="https://github.com/mstfknn/shhgit" />

        <!-- Open Graph -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="shhgit - Real-time Secret Scanner" />
        <meta property="og:description" content="Find secrets across GitHub, GitLab and BitBucket in real time before they lead to a breach." />
        <meta property="og:image" content="/logo.png" />

        <!-- Preconnect to third-party origins -->
        <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <!-- Critical CSS first -->
        <link rel="stylesheet" href="/style.css" />

        <!-- Third-party CSS with media hints -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl0HPNiecjHG182/lFXflzv5QKFP+dMPnO+VAwGM5sE+Yf0F9G2FxAdFAGTJ+kNfKfMcP6liwXwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
        <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" /></noscript>

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="/logo.png" />
    </head>

    <body>
        <!-- Skip to main content for keyboard/screen reader users -->
        <a href="#messages-wrapper" class="skip-link">Skip to main content</a>

        <div class="app-container">
            <aside id="menu" class="sidebar" role="complementary" aria-label="Signatures sidebar">
                <div class="sidebar-header">
                    <a href="https://github.com/mstfknn/shhgit" target="_blank" rel="noopener noreferrer" class="logo-link" aria-label="shhgit on GitHub">
                        <img src="/logo.png" alt="shhgit logo" class="logo" width="168" height="168" loading="eager" />
                    </a>

                    <div class="app-title">
                        <h1 class="title-text">
                            shhgit <span class="live-badge" aria-label="Live scanning active">live!</span>
                        </h1>
                        <span class="version-badge">v0.5</span>
                    </div>

                    <div class="stats-container" role="status" aria-live="polite">
                        <div class="stat-item">
                            <i class="fas fa-shield-alt" aria-hidden="true"></i>
                            <span id="matches-count">0 matches</span>
                        </div>
                        <div class="stat-item stat-filters">
                            <i class="fas fa-filter" aria-hidden="true"></i>
                            <span id="filters-count">0 filters</span>
                            <button class="delete-btn" id="filters-clear" title="Clear all filters" aria-label="Clear all filters">
                                <i class="fas fa-times" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <nav class="sidebar-content" aria-label="Signature filters">
                    <div class="signatures-header">
                        <i class="fas fa-list" aria-hidden="true"></i>
                        <span>Signatures</span>
                    </div>
                    <ul class="menu-list" id="signatures" role="listbox" aria-label="Filter by signature type"></ul>
                </nav>
            </aside>

            <main class="main-content" id="main">
                <header class="top-bar">
                    <div class="top-bar-left">
                        <fieldset class="settings-group">
                            <legend class="sr-only">Display settings</legend>
                            <label class="checkbox-label">
                                <input class="is-checkradio" id="setting-interesting-files" type="checkbox" name="setting-interesting-files" checked="checked" />
                                <span>Interesting file extensions</span>
                            </label>
                            <label class="checkbox-label">
                                <input class="is-checkradio" id="setting-high-entropy-strings" type="checkbox" name="setting-high-entropy-strings" checked="checked" />
                                <span>High entropy strings</span>
                            </label>
                            <label class="checkbox-label">
                                <input class="is-checkradio" id="setting-notifications" type="checkbox" name="notifications" />
                                <span>Notify on match</span>
                            </label>
                        </fieldset>
                    </div>
                    <div class="top-bar-right">
                        <span id="connection-status" class="connection-badge" role="status" aria-live="polite">
                            <i class="fas fa-circle" aria-hidden="true"></i>
                            <span>Connecting...</span>
                        </span>
                        <button class="mobile-menu-toggle" id="burger" aria-label="Toggle sidebar menu" aria-expanded="false" aria-controls="menu">
                            <span></span>
                            <span></span>
                            <span></span>
                        </button>
                    </div>
                </header>

                <div class="content-wrapper">
                    <div id="messages-wrapper">
                        <div class="table-container">
                            <table class="modern-table" aria-label="Discovered secrets">
                                <thead>
                                    <tr>
                                        <th class="col-source" scope="col"><i class="fas fa-globe" aria-hidden="true"></i><span class="sr-only">Source</span></th>
                                        <th class="col-found" scope="col"><i class="fas fa-clock" aria-hidden="true"></i> Found</th>
                                        <th class="col-signature" scope="col"><i class="fas fa-tag" aria-hidden="true"></i> Signature</th>
                                        <th class="col-matches" scope="col"><i class="fas fa-key" aria-hidden="true"></i> Matches</th>
                                        <th class="col-file" scope="col"><i class="fas fa-file" aria-hidden="true"></i> File</th>
                                        <th class="col-stars" scope="col" title="Repository stars"><i class="fas fa-star" aria-hidden="true"></i><span class="sr-only">Stars</span></th>
                                    </tr>
                                </thead>
                                <tbody id="messages"></tbody>
                            </table>
                        </div>

                        <!-- Empty state -->
                        <div id="empty-state" class="empty-state">
                            <i class="fas fa-search" aria-hidden="true"></i>
                            <h2>Scanning for secrets...</h2>
                            <p>Matches will appear here as they are discovered in real time.</p>
                        </div>

                        <div id="loading" class="loading-state show" role="status" aria-label="Loading">
                            <div class="spinner" aria-hidden="true"></div>
                            <p>Waiting for events...</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- Scripts deferred for performance -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/crypto-js.min.js" integrity="sha512-FLHbpiYSBOTKtG/4wHY88+5mMsDbxOBKO0FJKm5jGBNnDnic6ZhqBSMOYmVDIkMHEFXKPDJVDjN8BIjK9kxIg==" crossorigin="anonymous" referrerpolicy="no-referrer" defer></script>
        <script src="/script.js" defer></script>
    </body>
</html>
