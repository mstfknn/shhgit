worker_processes    auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen  80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

        access_log /var/log/nginx/access.log combined;
        error_log /var/log/nginx/error.log warn;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /push {
            # Only allow internal Docker network access
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;

            # Proxy POST requests to Python push server
            proxy_pass http://127.0.0.1:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 64k;
        }

        location /matches.jsonl {
            # Endpoint for frontend to read matches (same-origin only)
            add_header Content-Type application/x-ndjson;
            add_header Cache-Control no-cache;
            alias /tmp/matches.jsonl;
            try_files $uri =404;
        }

        location /events/ {
            # Legacy EventSource endpoint stub
            add_header Content-Type text/event-stream;
            add_header Cache-Control no-cache;
            add_header Connection keep-alive;
            return 200 ": keep-alive\n\n";
        }
    }
}